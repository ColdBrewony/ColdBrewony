name: Latest Tistory Blog Posts

on:
  schedule:
    - cron: "0 */6 * * *"   # 6시간마다
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest Tistory posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Pull in Tistory RSS posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://woo-nny.tistory.com/rss"
          max_post_count: 5
          commit_message: "chore: update latest blog posts"
          # 티스토리(카카오) WAF가 봇성 기본 UA를 406으로 막아 브라우저 UA + Accept 헤더 명시
          user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36"
          accept_header: "application/rss+xml, application/xml, text/xml, */*"
